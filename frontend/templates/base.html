<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}BeiSmart KE{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('beismart-theme') || 'dark');</script>
</head>
<body>

    <!-- TOP NAV -->
    <nav class="topnav">
        <a href="/" class="nav-brand">
            <div class="nav-brand-icon">🛒</div>
            <div>
                <div class="nav-brand-name">BeiSmart <span>KE</span></div>
                <div class="nav-brand-sub">Price Intelligence</div>
            </div>
        </a>

        <div class="nav-links">
            <a href="/search" class="nav-link {% if request.path == '/search' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <span>Search</span>
            </a>
            <a href="/history" class="nav-link {% if request.path == '/history' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>Price History</span>
            </a>
            <a href="/watchlist" class="nav-link {% if request.path == '/watchlist' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <span>Watchlist</span>
            </a>
        </div>

        <div class="nav-right">
            <div class="nav-status">
                <div class="nav-status-dot"></div>
                <span id="live-time" class="live-clock">--:--:--</span>
            </div>
            <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
                <span class="toggle-icon" id="theme-icon">🌙</span>
                <span id="theme-label">Dark</span>
            </button>
        </div>
    </nav>

    <!-- PAGE SHELL -->
    <div class="page">
        <div class="page-inner">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
        <span>&copy; 2026 BeiSmart KE &mdash; Built for smarter shopping in Kenya</span>
    </footer>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toast-container"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
